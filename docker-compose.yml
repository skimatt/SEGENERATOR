services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: segenerator
      POSTGRES_PASSWORD: segenerator
      POSTGRES_DB: segenerator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U segenerator -d segenerator"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://segenerator:segenerator@postgres:5432/segenerator?schema=public
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates
      - ./storage:/app/storage
      - ./umkm-479223-fddd8281bf40.json:/run/secrets/google-service-account.json:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
